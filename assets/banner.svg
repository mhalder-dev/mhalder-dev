<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0e13"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="ridge" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#59657a"/>
      <stop offset="0.5" stop-color="#3a4552"/>
      <stop offset="1"   stop-color="#28313d"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#0b0e13" stop-opacity="1"/>
      <stop offset="0.30" stop-color="#0b0e13" stop-opacity="0.86"/>
      <stop offset="0.50" stop-color="#0b0e13" stop-opacity="0"/>
    </linearGradient>

    <path id="a" d="M 1260 44  H 770 Q 660 44 660 154 V 360"/>
    <path id="b" d="M 1260 106 H 850 Q 740 106 740 216 V 360"/>
    <path id="c" d="M 1260 168 H 930 Q 820 168 820 278 V 360"/>
    <path id="d" d="M 1260 230 H 1010 Q 900 230 900 340 V 360"/>
    <path id="e" d="M 1260 292 H 1090 Q 980 292 980 402 V 360"/>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- each tube = shadow edge + body + ridge highlight + thin specular, so it reads as a rounded 3D tube -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#0f141c" stroke-width="50"><use href="#a"/><use href="#b"/><use href="#c"/><use href="#d"/><use href="#e"/></g>
    <g stroke="#212a37" stroke-width="38"><use href="#a"/><use href="#b"/><use href="#c"/><use href="#d"/><use href="#e"/></g>
    <g stroke="url(#ridge)" stroke-width="20"><use href="#a"/><use href="#b"/><use href="#c"/><use href="#d"/><use href="#e"/></g>
    <g stroke="#6b7688" stroke-width="3" opacity="0.45"><use href="#a"/><use href="#b"/><use href="#c"/><use href="#d"/><use href="#e"/></g>
  </g>

  <rect width="1200" height="320" fill="url(#fade)"/>

  <text x="64" y="150" fill="#f0f3f6" font-size="52" font-weight="700" letter-spacing="0.5">Mithun Halder</text>
  <text x="66" y="190" fill="#58A6FF" font-size="20" font-weight="600">Backend Engineer</text>
  <text x="66" y="220" fill="#8b949e" font-size="16">.NET microservices · airline &amp; GDS integration · ML researcher</text>
  <rect x="66" y="236" width="132" height="3" rx="1.5" fill="#58A6FF" opacity="0.85"/>
</svg>
