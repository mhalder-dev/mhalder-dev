name: Generate 3D Contribution Calendar

on:
  schedule:
    - cron: "30 0 * * *"     # daily
  workflow_dispatch:          # allow manual runs

# Not triggered on push:main on purpose — this workflow commits back to main,
# and triggering on push would create an infinite loop.

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3D contribution calendar" || { echo "no changes"; exit 0; }
          git push
