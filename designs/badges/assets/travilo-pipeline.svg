<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#30475e"/>
    </marker>
    <style>
      .node  { fill:#161b22; stroke:#30363d; }
      .title { fill:#58A6FF; font-size:13px; font-weight:600; }
      .sub   { fill:#8b949e; font-size:10px; }
      .lbl   { fill:#6e7681; font-size:9px; letter-spacing:.5px; }
      .pill  { fill:#1f2630; stroke:#30363d; }
      .pillt { fill:#c9d1d9; font-size:10px; }
      .wire  { stroke:#30475e; stroke-width:1.6; fill:none; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="299" rx="14" fill="#0d1117" stroke="#21262d"/>

  <text x="26" y="36" class="title">Travilo — request flow</text>
  <text x="26" y="54" class="sub">multi-supplier flight booking · one backend per agency</text>

  <!-- wires -->
  <line class="wire" x1="156" y1="170" x2="212" y2="170" marker-end="url(#arrow)"/>
  <line class="wire" x1="346" y1="170" x2="402" y2="170" marker-end="url(#arrow)"/>
  <line class="wire" x1="536" y1="170" x2="606" y2="170" marker-end="url(#arrow)"/>
  <text x="184" y="162" class="lbl" text-anchor="middle">REST</text>
  <text x="374" y="162" class="lbl" text-anchor="middle">gRPC</text>
  <text x="572" y="162" class="lbl" text-anchor="middle">REST · SOAP</text>

  <!-- travelling packets -->
  <circle r="4" fill="#58A6FF" cy="170">
    <animate attributeName="cx" values="156;212" dur="1.6s" begin="0s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#58A6FF" cy="170">
    <animate attributeName="cx" values="346;402" dur="1.6s" begin="0.45s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0.45s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#79c0ff" cy="170">
    <animate attributeName="cx" values="536;606" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- nodes -->
  <g>
    <rect class="node" x="26"  y="140" width="130" height="60" rx="10"/>
    <text x="91"  y="167" class="title" text-anchor="middle">Client</text>
    <text x="91"  y="185" class="sub"   text-anchor="middle">B2B / B2C</text>
  </g>
  <g>
    <rect class="node" x="216" y="140" width="130" height="60" rx="10"/>
    <text x="281" y="167" class="title" text-anchor="middle">API Gateway</text>
    <text x="281" y="185" class="sub"   text-anchor="middle">auth · routing</text>
  </g>
  <g>
    <rect class="node" x="406" y="140" width="130" height="60" rx="10"/>
    <text x="471" y="167" class="title" text-anchor="middle">Travilo</text>
    <text x="471" y="185" class="sub"   text-anchor="middle">.NET services</text>
  </g>

  <!-- suppliers cluster -->
  <rect class="node" x="610" y="86" width="264" height="168" rx="12"/>
  <text x="742" y="112" class="title" text-anchor="middle">GDS / OTA suppliers</text>

  <g>
    <rect class="pill" x="626" y="128" width="112" height="26" rx="7"/>
    <text x="682" y="145" class="pillt" text-anchor="middle">Amadeus</text>
    <rect class="pill" x="748" y="128" width="112" height="26" rx="7"/>
    <text x="804" y="145" class="pillt" text-anchor="middle">Sabre</text>

    <rect class="pill" x="626" y="164" width="112" height="26" rx="7"/>
    <text x="682" y="181" class="pillt" text-anchor="middle">AirArabia</text>
    <rect class="pill" x="748" y="164" width="112" height="26" rx="7"/>
    <text x="804" y="181" class="pillt" text-anchor="middle">AirBlue</text>

    <rect class="pill" x="626" y="200" width="112" height="26" rx="7"/>
    <text x="682" y="217" class="pillt" text-anchor="middle">Tripjack</text>
    <rect class="pill" x="748" y="200" width="112" height="26" rx="7"/>
    <text x="804" y="217" class="pillt" text-anchor="middle">Travelport</text>
  </g>

  <text x="26" y="284" class="sub">search · fare revalidation · PNR · e-ticketing · seat / meal / baggage · refunds</text>
</svg>
